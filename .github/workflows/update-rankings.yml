name: Update Rankings

on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install gspread oauth2client pyyaml

      - name: Run update script
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/update_rankings.py

      - name: Commit changes (only if updated)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add _data/

          # Check if there are changes AFTER staging
          if git diff --cached --quiet; then
            echo "No changes detected - skipping commit"
            exit 0
          fi

          git commit -m "Update rankings"
          git push
